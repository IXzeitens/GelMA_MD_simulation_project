#############################################################
## JOB DESCRIPTION                                         ##
#############################################################
# System: 3 GelMA in water box (~15,000 atoms)
# Stage: 2 - NPT Production Part 1 (0 to 10 ns)
# Temperature: 310 K
# Pressure: 1 atm
#############################################################

#############################################################
## ADJUSTABLE PARAMETERS                                   ##
#############################################################
set inputname      system_nvt
set outputname     system_npt_part1
set temperature    310

structure          debug_1.psf
coordinates        debug_1.pdb
outputName         $outputname

# Inherit physical state from NVT run
binCoordinates     $inputname.restart.coor
binVelocities      $inputname.restart.vel
extendedSystem     $inputname.restart.xsc

#############################################################
## SIMULATION PARAMETERS                                   ##
#############################################################
paraTypeCharmm      on
parameters          ../script/par_all36m_prot_hyp.prm
parameters          ../script/par_all36_carb.prm
parameters          ../script/par_all36_cgenff.prm
parameters          ../script/par_all36_lipid.prm
parameters          ../script/par_all36_na.prm
parameters          ../script/lma.prm
parameters          ../script/par_ions.prm

wrapWater           on
wrapAll             on

# Force-Field Parameters
exclude             scaled1-4
1-4scaling          1.0
cutoff              12.0
switching           on
switchdist          10.0
pairlistdist        14.0

# Integrator Parameters
timestep            2.0
rigidBonds          all
nonbondedFreq       1
fullElectFrequency  2
stepspercycle       10

# NAMD 3 GPU-resident integrator: OFF for NPT-equilibration phase.
# Plan A: short box-relaxation NPT (2 ns) runs on the CPU integrator (still
# uses GPU for non-bonded forces) because the system has just left NVT and
# may still produce occasional high-force spikes that CUDASOA's mid-kernel
# fail-safe ("Atoms moving too fast") cannot absorb. npt_2.conf re-enables
# CUDASOAintegrate on for production once the system is settled.
CUDASOAintegrate    off

# PME (Particle Mesh Ewald)
PME                 yes
PMEGridSpacing      1.0
PMEGridSizeX        108
PMEGridSizeY        108
PMEGridSizeZ        108

# Constant Temperature Control
langevin            on    
langevinDamping     1     
langevinTemp        $temperature
langevinHydrogen    no    

# Constant Pressure Control (NPT Ensemble)
margin                3.0 
useGroupPressure      yes 
useFlexibleCell       no  
useConstantArea       no  

langevinPiston        on
langevinPistonTarget  1.01325 
langevinPistonPeriod  100.0
langevinPistonDecay   50.0
langevinPistonTemp    $temperature

# Output Frequencies
restartfreq         50000
dcdfreq             50000  
xstFreq             50000
outputEnergies      10000
outputPressure      10000

#############################################################
## EXECUTION SCRIPT                                        ##
#############################################################
# NPT Run Part 1 — box equilibration only (2 ns = 1,000,000 × 2 fs).
# Volume converges in ~500 ps for water-dominated systems; 2 ns gives a
# safety margin for residual conformational relaxation before production.
run                 1000000
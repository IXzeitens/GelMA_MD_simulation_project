#############################################################
## JOB DESCRIPTION                                         ##
#############################################################
# System: 3 GelMA in water box (~15,000 atoms)
# Stage: 3 - NPT Production Part 2 (10 to 20 ns)
# Temperature: 310 K
# Pressure: 1 atm
#############################################################

#############################################################
## ADJUSTABLE PARAMETERS                                   ##
#############################################################
# Change inputname to the output of Part 1
set inputname      system_npt_part1
set outputname     system_npt_part2
set temperature    310

structure          debug_1.psf
coordinates        debug_1.pdb
outputName         $outputname

# Inherit physical state from NPT Part 1 run
binCoordinates     $inputname.restart.coor
binVelocities      $inputname.restart.vel
extendedSystem     $inputname.restart.xsc

#############################################################
## SIMULATION PARAMETERS                                   ##
#############################################################
paraTypeCharmm      on
parameters          ../script/par_all36m_prot_hyp.prm
parameters          ../script/par_all36_carb.prm
parameters          ../script/par_all36_cgenff.prm
parameters          ../script/par_all36_lipid.prm
parameters          ../script/par_all36_na.prm
parameters          ../script/lma.prm
parameters          ../script/par_ions.prm

wrapWater           on
wrapAll             on

# Force-Field Parameters
exclude             scaled1-4
1-4scaling          1.0
cutoff              12.0
switching           on
switchdist          10.0
pairlistdist        14.0

# Integrator Parameters
timestep            2.0
rigidBonds          all
nonbondedFreq       1
fullElectFrequency  2
stepspercycle       10

# NAMD 3 GPU-resident integrator (requires rigidBonds + langevinHydrogen no +
# useGroupPressure yes + useFlexibleCell no, all satisfied below).
CUDASOAintegrate    on

# PME (Particle Mesh Ewald)
PME                 yes
PMEGridSpacing      1.0
PMEGridSizeX        108
PMEGridSizeY        108
PMEGridSizeZ        108

# Constant Temperature Control
langevin            on    
langevinDamping     1     
langevinTemp        $temperature
langevinHydrogen    no    

# Constant Pressure Control (NPT Ensemble)
margin                3.0 
useGroupPressure      yes 
useFlexibleCell       no  
useConstantArea       no  

langevinPiston        on
langevinPistonTarget  1.01325 
langevinPistonPeriod  100.0
langevinPistonDecay   50.0
langevinPistonTemp    $temperature

# Output Frequencies
restartfreq         50000
dcdfreq             50000  
xstFreq             50000
outputEnergies      10000
outputPressure      10000

#############################################################
## EXECUTION SCRIPT                                        ##
#############################################################
# NPT Run Part 2 — production (18 ns = 9,000,000 × 2 fs).
# CUDASOAintegrate stays ON for full GPU speed; the system is now
# equilibrated so the stochastic CUDASOA velocity-limit trip is much less
# likely than during the post-NVT phase.
run                 9000000
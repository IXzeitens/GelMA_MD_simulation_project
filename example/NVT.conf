#############################################################
## JOB DESCRIPTION                                         ##
#############################################################
# System: 3 GelMA in water box (~15,000 atoms)
# Stage: 1 - Minimization & NVT Equilibration (1 ns)
# Temperature: 310 K
#############################################################

#############################################################
## ADJUSTABLE PARAMETERS                                   ##
#############################################################
set outputname     system_nvt
set temperature    310

structure          debug_1.psf
coordinates        debug_1.pdb
outputName         $outputname

firsttimestep      0

#############################################################
## SIMULATION PARAMETERS                                   ##
#############################################################
paraTypeCharmm      on
parameters          ../script/par_all36m_prot_hyp.prm
parameters          ../script/par_all36_carb.prm
parameters          ../script/par_all36_cgenff.prm
parameters          ../script/par_all36_lipid.prm
parameters          ../script/par_all36_na.prm
parameters          ../script/lma.prm
parameters          ../script/par_ions.prm

# Initial Periodic Boundary Conditions
cellBasisVector1    104.0   0.0   0.0
cellBasisVector2     0.0  104.0   0.0
cellBasisVector3     0.0   0.0  104.0
cellOrigin           0.0   0.0   0.0

wrapWater           on
wrapAll             on

# Force-Field Parameters
exclude             scaled1-4
1-4scaling          1.0
cutoff              12.0
switching           on
switchdist          10.0
pairlistdist        14.0

# Integrator Parameters
timestep            2.0
rigidBonds          all
nonbondedFreq       1
fullElectFrequency  2
stepspercycle       10

# NAMD 3 GPU-resident integrator: DISABLED for NVT equilibration.
# At ~60k atoms the GPU integrator occasionally trips the "Atoms moving too fast"
# fail-safe after ~60 ps of otherwise stable dynamics — a known stochastic
# CUDASOA issue. CPU integrator is ~6x slower (1 ns ≈ 2-3 hr) but rock solid for
# the initial equilibration. Production NPT runs (npt_1/npt_2.conf) keep
# CUDASOAintegrate on for full GPU speed once the system is settled.
CUDASOAintegrate    off

# Initialize Velocity Temperature
temperature         $temperature

# PME (Particle Mesh Ewald)
PME                 yes
PMEGridSpacing      1.0
PMEGridSizeX        108
PMEGridSizeY        108
PMEGridSizeZ        108

# Constant Temperature Control (NVT Ensemble)
langevin            on    
langevinDamping     1     
langevinTemp        $temperature
langevinHydrogen    no    

# Output Frequencies
restartfreq         5000
dcdfreq             5000  
xstFreq             5000
outputEnergies      1000
outputPressure      1000

#############################################################
## EXECUTION SCRIPT                                        ##
#############################################################
# 1. Energy Minimization (5,000 steps)
minimize            50000

# 2. Reinitialize velocities to 310 K
reinitvels          $temperature

# 3. NVT Equilibration (1 ns)
run                 500000